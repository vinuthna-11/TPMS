<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your OTP Code</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px;">

    <div style="max-width: 600px; margin: auto; background-color: #ffffff; border-radius: 12px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid #e74c3c;">
        
        <h2 style="color: #2c3e50; text-align: center; font-weight: 700;">Your One-Time Password</h2>
        
        <p style="color: #555555; font-size: 16px; text-align: center; line-height: 1.6;">
            Please use the following code to complete your verification. This code is valid for 5 minutes.
        </p>
        
        <div style="background-color: #f8f9fa; border-radius: 8px; padding: 15px 20px; text-align: center; margin: 30px 0; border: 1px dashed #e0e0e0;">
            <p style="color: #e74c3c; font-size: 28px; font-weight: bold; letter-spacing: 5px; margin: 0;">
                {{ otp }}
            </p>
        </div>
        
        <p style="color: #555555; font-size: 14px; text-align: center;">
            If you did not request this code, you can safely ignore this email.
        </p>
        
        <hr style="border: none; border-top: 1px solid #ecf0f1; margin: 30px 0;">
        
        <p style="color: #7f8c8d; font-size: 12px; text-align: center;">
            TPMS Job Portal
        </p>
    </div>

</body>
</html>
